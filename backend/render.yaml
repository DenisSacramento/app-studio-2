services:
  - type: web
    name: app-studio-2-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        value: https://app-studio-2.onrender.com,https://app.expo.dev
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 10
      - key: RESET_PASSWORD_TOKEN_TTL_MINUTES
        value: 20
